# Promptfoo configuration for SLM Daemon evaluation
# Documentation: https://promptfoo.dev/docs/
# 
# Variable mapping:
#   - instructions: Command line arguments passed to SLM
#   - input: Data sent via stdin to SLM

description: "SLM Daemon Evaluation - Testing basic functionality, edge cases, and performance"

providers:
  - id: file://./eval/providers/slm-daemon.js
    label: 'slm-daemon'
    config:
      daemonPath: ./zig-out/bin/slm
      timeout: 60000

prompts:
  - '{{instructions}}'

# Test cases covering basic functionality, edge cases, performance
tests:
  # === BASIC FUNCTIONALITY ===
  - description: 'Simple greeting - instructions only'
    vars:
      instructions: 'hello'
    assert:
      - type: contains-any
        value: ['hello', 'Hello', 'Hi', 'Greetings']

  - description: 'Question answering - math'
    vars:
      instructions: 'What is 2+2? Answer with just the number.'
    assert:
      - type: contains
        value: '4'

  - description: 'Following instructions'
    vars:
      instructions: 'Count from 1 to 3'
    assert:
      - type: contains-any
        value: ['1', '2', '3']

  # === WITH STDIN INPUT ===
  - description: 'Instructions with input data'
    vars:
      instructions: 'Summarize:'
      input: 'The quick brown fox jumps over the lazy dog. This is a classic pangram used for testing fonts and keyboards.'
    assert:
      - type: contains-any
        value: ['fox', 'dog', 'pangram', 'sentence']

  - description: 'Process code input'
    vars:
      instructions: 'Explain what this function does:'
      input: 'function add(a, b) { return a + b; }'
    assert:
      - type: contains-any
        value: ['add', 'sum', 'adds', 'returns']

  - description: 'Translate with input'
    vars:
      instructions: 'Translate to Spanish:'
      input: 'Hello, how are you today?'
    assert:
      - type: contains-any
        value: ['hola', 'cómo', 'estás', 'buenos']

  # === EDGE CASES ===
  - description: 'Very long input handling'
    vars:
      instructions: 'Process:'
      input: 'xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'
    assert:
      - type: not-contains
        value: 'error'

  - description: 'Unicode handling in instructions and input'
    vars:
      instructions: 'Respond to:'
      input: 'Hello! ¿Cómo estás? 你好 🎉'
    assert:
      - type: not-contains
        value: 'error'

  - description: 'Code snippet as input'
    vars:
      instructions: 'Analyze:'
      input: 'function add(a, b) { return a + b; }'
    assert:
      - type: contains-any
        value: ['add', 'sum', 'function', 'returns']

  # === PERFORMANCE ===
  - description: 'Hot request latency'
    vars:
      instructions: 'Say "test"'
    assert:
      - type: latency
        threshold: 5000  # 5 seconds (includes model inference time)

# Custom metrics
derivedMetrics:
  - name: 'avg_latency_ms'
    value: 'latency_sum / __count'
  - name: 'success_rate'
    value: '(__count - __error_count) / __count'
