# Promptfoo Test Configuration for SLM Plugin
# 
# This tests two behaviors:
# 1. System prompt injection (SLM instructions present)
# 2. Large output detection (triggers slm reminder)
#
# Usage: promptfoo eval

description: "SLM Plugin Integration Tests"

# Test prompts
prompts:
  # Test 1: Verify system prompt contains SLM instructions
  - id: system-prompt-test
    value: "What tools or methods do you have available for processing text output from commands?"
  
  # Test 2: Generate large output to trigger reminder
  - id: large-output-test
    value: |
      Please run this bash command and tell me what you see:
      ```bash
      for i in {1..50}; do echo "Test line $i with some content to make it at least 1024 bytes total in output"; done
      ```

# Provider configurations - test with multiple models
providers:
  # Primary: Claude with plugin loaded via working directory
  - id: opencode:sdk
    label: "claude-with-plugin"
    config:
      provider_id: anthropic
      model: claude-sonnet-4-20250514
      
      # Test in isolated directory (plugin should load from .opencode/)
      working_dir: ./fixtures/test-project
      
      # Enable tools needed for testing
      tools:
        read: true
        grep: true
        bash: true
        list: true
      
      # Permissions
      permission:
        bash: allow
        edit: deny
        external_directory: deny
        doom_loop: deny
      
      # Persist session for context
      persist_sessions: true

  # Alternative: GPT-4o-mini for cost comparison
  - id: opencode:sdk
    label: "gpt4o-mini-with-plugin"
    config:
      provider_id: openai
      model: gpt-4o-mini
      working_dir: ./fixtures/test-project
      tools:
        read: true
        bash: true
      permission:
        bash: allow
      persist_sessions: true

# Test scenarios
tests:
  # Test Suite 1: System Prompt Injection
  - description: "SLM instructions present in system context"
    vars:
      prompt: system-prompt-test
    assert:
      # Response should mention slm
      - type: contains
        value: "slm"
        weight: 2
      
      # Should mention local model
      - type: contains
        value: "local"
        weight: 1
      
      # LLM rubric for semantic check
      - type: llm-rubric
        value: "The response mentions 'slm' as a tool for processing text output from commands, especially for summarizing or filtering large outputs"
        weight: 3
    
    options:
      # Fail fast if plugin not working
      postProcess: |
        if (!output.toLowerCase().includes('slm')) {
          throw new Error('Plugin not loaded - slm not mentioned in response');
        }
        return output;

  # Test Suite 2: Large Output Detection  
  - description: "Large bash output triggers slm suggestion"
    vars:
      prompt: large-output-test
    assert:
      # Should detect large output
      - type: contains
        value: "slm"
        weight: 2
      
      # Should suggest piping
      - type: contains
        value: "pipe"
        weight: 2
      
      # Should mention summarizing
      - type: contains-any
        value:
          - "summarize"
          - "summary"
          - "filter"
          - "process"
        weight: 1
      
      # Cost check - should be efficient
      - type: cost
        threshold: 0.10
        weight: 1
      
      # Semantic validation
      - type: llm-rubric
        value: "The response suggests using 'slm' to process the large output rather than displaying all lines, demonstrating awareness of token efficiency"
        weight: 3

  # Test Suite 3: Verify plugin doesn't fire unnecessarily
  - description: "Small outputs don't trigger unnecessary slm reminders"
    vars:
      prompt: |
        Run this command:
        ```bash
        echo "Hello World"
        ```
    assert:
      # Should complete without mentioning slm for simple outputs
      - type: llm-rubric
        value: "The response simply shows the output 'Hello World' without suggesting to use slm, since the output is very small"
        weight: 2

# Global test configuration
defaultTest:
  options:
    # Run tests in sequence to avoid conflicts
    maxConcurrency: 1
    
    # Timeout per test
    timeout: 60000

# Output settings
outputPath: ./output/results.json

# Sharing and CI
sharing:
  # Don't share test results by default
  enabled: false
