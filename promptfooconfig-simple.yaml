# Simplified Promptfoo configuration for SLM Daemon evaluation
# Quick tests to verify daemon functionality
#
# Variable mapping:
#   - instructions: Command line arguments passed to SLM
#   - input: Data sent via stdin to SLM

description: "SLM Daemon Quick Evaluation"

providers:
  - id: file://./eval/providers/slm-daemon.js
    config:
      daemonPath: ./zig-out/bin/slm
      timeout: 60000

prompts:
  - '{{instructions}}'

tests:
  # Basic functionality - instructions only
  - description: 'Basic prompt - hello'
    vars:
      instructions: 'hello'
    assert:
      - type: contains-any
        value: ['hello', 'Hello']
  
  - description: 'Basic prompt - count to 5'
    vars:
      instructions: 'count from 1 to 5'
    assert:
      - type: contains-any
        value: ['1', '2', '3', '4', '5']

  - description: 'Question answering'
    vars:
      instructions: 'What is 2+2? Answer with just the number.'
    assert:
      - type: contains-any
        value: ['4']

  # With input data
  - description: 'Instructions with input'
    vars:
      instructions: 'Summarize:'
      input: 'The cat sat on the mat and looked at the bird.'
    assert:
      - type: contains-any
        value: ['cat', 'sat', 'mat', 'bird']

  # Performance test
  - description: 'Response time'
    vars:
      instructions: 'say "test completed"'
    assert:
      - type: latency
        threshold: 30000
