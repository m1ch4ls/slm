# Quick test of LLM Rubric Judge with GPT-5

description: "Quick LLM judge test"

providers:
  - id: file://./eval/providers/slm-daemon.js
    label: 'slm-daemon'
    config:
      daemonPath: ./zig-out/bin/slm
      timeout: 30000

defaultTest:
  options:
    provider: openai:gpt-5

prompts:
  - '{{instructions}}'

tests:
  - description: 'Judge test - Simple question'
    vars:
      instructions: 'What is the capital of France? Answer with one word.'
    assert:
      - type: llm-rubric
        value: 'The response correctly identifies Paris as the capital of France in one word or a very short phrase.'
        threshold: 0.8
